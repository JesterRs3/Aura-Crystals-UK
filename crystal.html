<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crystal Detail – Aura Crystals UK</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:        #f7f2ec;
      --parchment:    #ede4d6;
      --blush:        #dfc9b4;
      --muted-rose:   #c4a08e;
      --stone:        #7d6d63;
      --deep:         #2e2520;
      --accent:       #a86d56;
      --gold:         #c4973e;
      --gold-light:   #e2bf78;
      --wood-dark:    #3b2a1a;
      --wood-mid:     #5c3d22;
      --wood-light:   #8b5e35;
      --font-display: 'Cormorant Garamond', serif;
      --font-body:    'Jost', sans-serif;
      --crystal-color: #c4973e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      color: var(--deep);
      min-height: 100vh;
      overflow-x: hidden;
      background-color: #f0e8dc;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(102deg, transparent, transparent 2px, rgba(92,61,34,0.03) 2px, rgba(92,61,34,0.03) 4px),
        repeating-linear-gradient(98deg, transparent, transparent 6px, rgba(59,42,26,0.025) 6px, rgba(59,42,26,0.025) 7px),
        linear-gradient(160deg, #f5ece0 0%, #ede0cc 20%, #e8d8c2 40%, #f0e4d2 60%, #ecddd0 80%, #e6d6c4 100%);
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 4rem;
      background:
        repeating-linear-gradient(100deg, transparent, transparent 4px, rgba(92,61,34,0.05) 4px, rgba(92,61,34,0.05) 5px),
        linear-gradient(180deg, #3b2a1a 0%, #4a3320 60%, #3b2a1a 100%);
      border-bottom: 3px solid var(--gold);
      box-shadow: 0 4px 20px rgba(30,15,5,0.4), 0 1px 0 rgba(255,200,100,0.15);
    }
    .nav-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
    .logo-icon {
      color: var(--gold); font-size: 1.2rem;
      animation: spin-slow 10s linear infinite;
      display: inline-block;
      filter: drop-shadow(0 0 6px rgba(196,151,62,0.6));
    }
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .logo-text {
      font-family: var(--font-display); font-size: 1.4rem; font-weight: 400;
      color: #f0dfc0; letter-spacing: 0.06em; text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .logo-uk {
      font-size: 0.72rem; font-family: var(--font-body); font-weight: 300;
      letter-spacing: 0.18em; color: var(--gold-light); margin-left: 4px; vertical-align: super;
    }
    .nav-links { display: flex; list-style: none; gap: 2.5rem; }
    .nav-links a {
      font-family: var(--font-body); font-size: 0.8rem; font-weight: 300;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(240,220,190,0.75); text-decoration: none; transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--gold-light); }
    .nav-highlight { color: var(--gold-light) !important; border: 1px solid rgba(196,151,62,0.5); padding: 0.3rem 0.9rem; }
    .nav-cart {
      display: flex; align-items: center; gap: 0.35rem; cursor: pointer;
      font-size: 1.1rem; color: rgba(240,220,190,0.75); text-decoration: none; transition: color 0.3s;
    }
    .nav-cart:hover { color: var(--gold-light); }
    .cart-count {
      font-family: var(--font-body); font-size: 0.72rem; font-weight: 500;
      background: var(--gold); color: var(--wood-dark);
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* WOOD DIVIDER */
    .wood-divider {
      position: relative; z-index: 1; height: 6px;
      background: linear-gradient(90deg, var(--wood-dark) 0%, var(--wood-mid) 15%, var(--wood-light) 30%, #a07040 45%, var(--wood-light) 55%, var(--wood-mid) 70%, var(--wood-dark) 85%, var(--wood-mid) 100%);
      box-shadow: 0 2px 8px rgba(30,15,5,0.25), inset 0 1px 0 rgba(255,200,120,0.2), inset 0 -1px 0 rgba(0,0,0,0.3);
    }

    /* BREADCRUMB */
    .breadcrumb-bar {
      position: relative; z-index: 1;
      padding: 5.5rem 4rem 0;
    }
    .breadcrumb {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.76rem; font-weight: 300; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--stone); text-decoration: none;
      transition: color 0.3s;
    }
    .breadcrumb:hover { color: var(--gold); }

    /* CRYSTAL HERO */
    .crystal-hero {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 80vh;
      margin-top: 1rem;
    }

    /* LEFT — image panel */
    .crystal-image-panel {
      position: relative;
      overflow: hidden;
      background: var(--wood-dark);
    }
    .crystal-image-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 5px;
      background: var(--crystal-color);
      z-index: 2;
      box-shadow: 0 0 20px rgba(196,151,62,0.4);
    }
    .crystal-image-panel::after {
      content: '';
      position: absolute; inset: 0;
      background:
        linear-gradient(to right, transparent 70%, rgba(240,232,220,0.18) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.2) 100%);
      pointer-events: none;
      z-index: 1;
    }
    .crystal-hero-img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      display: block;
      transition: transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .crystal-image-panel:hover .crystal-hero-img { transform: scale(1.04); }
    .crystal-img-fallback {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 8rem; opacity: 0.9;
    }

    /* RIGHT — info panel */
    .crystal-info-panel {
      position: relative;
      padding: 3.5rem 4rem;
      background:
        repeating-linear-gradient(100deg, transparent, transparent 4px, rgba(92,61,34,0.04) 4px, rgba(92,61,34,0.04) 5px),
        linear-gradient(160deg, #ede4d6 0%, #e4d8c5 50%, #ede0d0 100%);
      display: flex; flex-direction: column;
      justify-content: center; gap: 1.4rem;
    }
    .crystal-eyebrow {
      font-size: 0.7rem; font-weight: 300; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--gold);
      opacity: 0; animation: fadeUp 0.6s ease forwards 0.2s;
    }
    .crystal-name {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 4vw, 3.8rem);
      font-weight: 300; line-height: 1.05; color: var(--deep);
      text-shadow: 0 2px 8px rgba(0,0,0,0.08);
      opacity: 0; animation: fadeUp 0.6s ease forwards 0.35s;
    }
    .crystal-tagline {
      font-family: var(--font-display);
      font-size: 1.1rem; font-weight: 300; font-style: italic;
      color: var(--stone); line-height: 1.5;
      opacity: 0; animation: fadeUp 0.6s ease forwards 0.5s;
    }
    .crystal-price-row {
      display: flex; align-items: center; gap: 1.5rem;
      opacity: 0; animation: fadeUp 0.6s ease forwards 0.6s;
    }
    .crystal-price {
      font-family: var(--font-display);
      font-size: 2.2rem; font-weight: 600; color: var(--accent);
    }
    .crystal-stock {
      font-size: 0.72rem; font-weight: 300; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--stone);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .crystal-stock::before {
      content: '';
      width: 7px; height: 7px; border-radius: 50%;
      background: #7aaa7a;
      box-shadow: 0 0 6px rgba(122,170,122,0.6);
      display: inline-block;
    }

    /* Property tags */
    .crystal-properties {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      opacity: 0; animation: fadeUp 0.6s ease forwards 0.7s;
    }
    .prop-tag {
      font-size: 0.68rem; font-weight: 400; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--wood-mid);
      border: 1px solid rgba(92,61,34,0.25);
      padding: 0.3rem 0.75rem;
      background: rgba(255,255,255,0.55);
      transition: border-color 0.3s, color 0.3s, background 0.3s;
    }
    .prop-tag:hover { border-color: var(--gold); color: var(--gold); background: rgba(196,151,62,0.07); }

    /* Qty + Add to cart */
    .cart-row {
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      opacity: 0; animation: fadeUp 0.6s ease forwards 0.85s;
    }
    .qty-control {
      display: flex; align-items: center;
      border: 1px solid rgba(196,151,62,0.4);
      background: rgba(255,255,255,0.6);
    }
    .qty-control button {
      width: 40px; height: 46px;
      background: none; border: none;
      font-size: 1.2rem; color: var(--stone);
      cursor: pointer; transition: color 0.2s, background 0.2s;
      font-family: var(--font-body);
    }
    .qty-control button:hover { color: var(--gold); background: rgba(196,151,62,0.08); }
    .qty-control .qty-display {
      min-width: 44px; text-align: center;
      font-size: 0.95rem; font-weight: 400; color: var(--deep);
      padding: 0 0.5rem;
      border-left: 1px solid rgba(196,151,62,0.25);
      border-right: 1px solid rgba(196,151,62,0.25);
      line-height: 46px;
    }
    .btn-add-to-cart {
      flex: 1; min-width: 180px;
      padding: 0.85rem 2rem;
      background: var(--wood-dark);
      border: 1px solid var(--gold);
      color: var(--gold-light);
      font-family: var(--font-body); font-size: 0.78rem;
      font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, color 0.3s, box-shadow 0.3s, transform 0.2s;
      position: relative; overflow: hidden;
    }
    .btn-add-to-cart::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(196,151,62,0) 40%, rgba(196,151,62,0.15) 100%);
      opacity: 0; transition: opacity 0.3s;
    }
    .btn-add-to-cart:hover {
      background: #4a3320;
      box-shadow: 0 6px 25px rgba(30,15,5,0.35);
      transform: translateY(-2px);
    }
    .btn-add-to-cart:hover::after { opacity: 1; }
    .btn-add-to-cart:active { transform: translateY(0); }
    .btn-add-to-cart.added { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-wishlist {
      width: 46px; height: 46px;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(196,151,62,0.35);
      color: var(--muted-rose); font-size: 1rem;
      cursor: pointer; transition: all 0.3s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-wishlist:hover { border-color: var(--accent); color: var(--accent); background: rgba(168,109,86,0.08); }

    /* DETAIL TABS */
    .detail-section {
      position: relative; z-index: 1;
      padding: 4rem 4rem 5rem;
    }
    .tabs {
      display: flex; gap: 0;
      border-bottom: 2px solid rgba(196,151,62,0.2);
      margin-bottom: 2.5rem;
      overflow-x: auto;
    }
    .tab-btn {
      padding: 0.85rem 2rem;
      background: none; border: none;
      font-family: var(--font-body); font-size: 0.78rem;
      font-weight: 300; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--stone); cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.3s, border-color 0.3s;
      white-space: nowrap;
    }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-btn:hover:not(.active) { color: var(--deep); }
    .tab-panel { display: none; animation: fadeUp 0.4s ease; }
    .tab-panel.active { display: block; }
    .tab-content { max-width: 720px; }
    .tab-content p {
      font-size: 0.95rem; font-weight: 300;
      line-height: 1.95; color: var(--stone);
      margin-bottom: 1rem;
    }
    .tab-content p:last-child { margin-bottom: 0; }

    /* RELATED CRYSTALS */
    .related-section {
      position: relative; z-index: 1;
      padding: 3rem 4rem 5rem;
      background:
        repeating-linear-gradient(100deg, transparent, transparent 4px, rgba(92,61,34,0.04) 4px, rgba(92,61,34,0.04) 5px),
        linear-gradient(170deg, #ede4d6 0%, #e4d8c5 40%, #eae0d0 70%, #e6dac8 100%);
    }
    .section-header { text-align: center; margin-bottom: 2.5rem; }
    .section-header h2 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 300; color: var(--deep); margin-bottom: 0.4rem;
    }
    .section-header p { font-size: 0.85rem; font-weight: 300; color: var(--stone); letter-spacing: 0.1em; }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem; max-width: 1100px; margin: 0 auto;
    }
    .related-card {
      display: block; text-decoration: none;
      background: linear-gradient(160deg, rgba(255,255,255,0.85) 0%, rgba(250,244,235,0.9) 100%);
      border: 1px solid rgba(196,151,62,0.18);
      border-bottom: 4px solid rgba(92,61,34,0.3);
      padding: 1.8rem 1.2rem 1.5rem;
      text-align: center;
      transition: transform 0.35s, box-shadow 0.35s;
      box-shadow: 0 4px 15px rgba(59,42,26,0.1);
      position: relative;
    }
    .related-card::after {
      content: '';
      position: absolute; bottom: -4px; left: 8px; right: 8px; height: 4px;
      background: repeating-linear-gradient(90deg, rgba(92,61,34,0.6), rgba(92,61,34,0.4) 4px, rgba(139,94,53,0.5) 4px, rgba(139,94,53,0.3) 8px);
    }
    .related-card:hover { transform: translateY(-7px); box-shadow: 0 16px 40px rgba(59,42,26,0.18); }
    .related-icon {
      font-size: 2.8rem; margin-bottom: 0.8rem; display: block;
      animation: float 5s ease-in-out infinite;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-14px) rotate(5deg); }
    }
    .related-name {
      font-family: var(--font-display); font-size: 1.2rem;
      font-weight: 400; color: var(--deep); margin-bottom: 0.3rem; display: block;
    }
    .related-price {
      font-family: var(--font-display); font-size: 1rem;
      color: var(--accent); font-weight: 600; display: block;
    }

    /* TOAST */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 300;
      background: linear-gradient(135deg, #3b2a1a, #4a3320);
      color: var(--gold-light);
      padding: 0.85rem 1.6rem;
      font-size: 0.82rem; font-weight: 300; letter-spacing: 0.08em;
      border-left: 3px solid var(--gold);
      box-shadow: 0 8px 25px rgba(30,15,5,0.4);
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* FOOTER */
    .footer {
      position: relative; z-index: 1;
      text-align: center; padding: 3rem 2rem;
      font-size: 0.82rem; font-weight: 300;
      letter-spacing: 0.05em; line-height: 2.2;
      background:
        repeating-linear-gradient(100deg, transparent, transparent 4px, rgba(92,61,34,0.06) 4px, rgba(92,61,34,0.06) 5px),
        linear-gradient(180deg, #2a1e14 0%, #1e1409 100%);
      border-top: 3px solid var(--gold);
      box-shadow: 0 -4px 20px rgba(30,15,5,0.3);
      color: rgba(230,210,180,0.7);
    }
    .footer-links { display: flex; gap: 2rem; justify-content: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .footer-links a { color: rgba(226,191,120,0.6); text-decoration: none; font-size: 0.78rem; font-weight: 300; letter-spacing: 0.12em; text-transform: uppercase; transition: color .3s; }
    .footer-links a:hover { color: var(--gold-light); }
    .footer a { color: var(--gold-light); text-decoration: none; transition: opacity .3s; }
    .footer a:hover { opacity: 0.7; }
    .footer-small { font-size: 0.7rem; opacity: 0.35; margin-top: 0.4rem; }

    /* NOT FOUND */
    .not-found {
      position: relative; z-index: 1;
      min-height: 70vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 4rem 2rem;
    }
    .not-found h2 { font-family: var(--font-display); font-size: 2.5rem; font-weight: 300; color: var(--deep); margin-bottom: 1rem; }
    .not-found p { font-size: 0.9rem; font-weight: 300; color: var(--stone); margin-bottom: 2rem; }
    .not-found a {
      display: inline-block; padding: 0.9rem 2.4rem;
      background: transparent; border: 1px solid var(--gold);
      color: var(--gold); font-family: var(--font-body);
      font-size: 0.78rem; letter-spacing: 0.18em;
      text-transform: uppercase; text-decoration: none;
      transition: background 0.3s, color 0.3s;
    }
    .not-found a:hover { background: var(--gold); color: var(--wood-dark); }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* HAMBURGER */
    .nav-hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; z-index: 1001; }
    .nav-hamburger span { display: block; width: 22px; height: 2px; background: var(--gold-light); border-radius: 2px; transition: transform 0.3s ease, opacity 0.3s ease; }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .navbar { padding: 1rem 1.5rem; }
      .nav-hamburger { display: flex; }
      .nav-links { display: none; position: fixed; inset: 0; background: rgba(20,12,5,0.97); backdrop-filter: blur(10px); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; gap: 2.5rem; }
      .nav-links.mobile-open { display: flex; }
      .nav-links.mobile-open li { list-style: none; }
      .nav-links.mobile-open a { font-size: 1.3rem; letter-spacing: 0.1em; color: rgba(240,220,190,0.85); }
      .nav-links.mobile-open a:hover { color: var(--gold-light); }
      .crystal-hero { grid-template-columns: 1fr; min-height: auto; }
      .crystal-image-panel { height: 55vw; min-height: 260px; max-height: 420px; }
      .crystal-info-panel { padding: 2rem 1.5rem; }
      .breadcrumb-bar { padding: 5rem 1.5rem 0; }
      .detail-section { padding: 2.5rem 1.5rem 3rem; }
      .related-section { padding: 2rem 1.5rem 3rem; }
    }
    @media (max-width: 560px) {
      .crystal-name { font-size: 2.2rem; }
      .cart-row { flex-direction: column; align-items: stretch; }
      .btn-add-to-cart { min-width: 0; }
    }
  </style>
</head>
<body>

  <div class="bg-scene">
    <div class="bg-crystal bgc-1"></div>
    <div class="bg-crystal bgc-2"></div>
    <div class="bg-crystal bgc-3"></div>
    <div class="bg-crystal bgc-4"></div>
    <div class="bg-crystal bgc-5"></div>
    <div class="bg-crystal bgc-6"></div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">Aura Crystals <span class="logo-uk">UK</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="signup.html" class="nav-highlight">Sign Up</a></li>
    </ul>
    <button class="nav-hamburger" id="navHamburger" aria-label="Open menu" onclick="toggleMobileNav()">
      <span></span><span></span><span></span>
    </button>
    <a href="cart.html" class="nav-cart">
      <span>&#9671;</span>
      <span class="cart-count" id="cartCount">0</span>
    </a>
  </nav>

  <!-- BREADCRUMB -->
  <div class="breadcrumb-bar">
    <a href="shop.html" class="breadcrumb">← Back to Shop</a>
  </div>

  <!-- MAIN CONTENT — injected by JS -->
  <div id="crystalPage"></div>

  <!-- TOAST -->
  <div class="toast" id="toast">Added to basket ✦</div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-links">
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>

  // =============================================
  //  CART — same sessionStorage key as index.html
  // =============================================
  function getCart() {
    try { return JSON.parse(sessionStorage.getItem("aura_cart")) || []; }
    catch(e) { return []; }
  }
  function saveCart(cart) {
    sessionStorage.setItem("aura_cart", JSON.stringify(cart));
  }
  function updateCartCount() {
    const el = document.getElementById("cartCount");
    if (!el) return;
    el.textContent = getCart().reduce((s, i) => s + i.qty, 0);
  }
  function showToast() {
    const t = document.getElementById("toast");
    if (!t) return;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  let qty = 1;

  function addToCartFromDetail(productId) {
    const base = products.find(p => p.id === productId);
    if (!base) return;
    const cart = getCart();
    const existing = cart.find(i => i.id === productId);
    if (existing) { existing.qty += qty; }
    else { cart.push({ ...base, qty }); }
    saveCart(cart);
    updateCartCount();
    showToast();
    const btn = document.getElementById("addCartBtn");
    if (btn) {
      btn.textContent = "Added ✦";
      btn.classList.add("added");
      setTimeout(() => { btn.textContent = "Add to Basket"; btn.classList.remove("added"); }, 1800);
    }
  }

  function changeQtyDetail(delta) {
    qty = Math.max(1, qty + delta);
    const el = document.getElementById("qtyDisplay");
    if (el) el.textContent = qty;
  }

  // =============================================
  //  TABS

  function switchTab(tabId) {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    document.querySelector('[data-tab="' + tabId + '"]').classList.add("active");
    document.getElementById("tab-" + tabId).classList.add("active");
  }
